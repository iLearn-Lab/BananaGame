<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Creative Portfolio</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=DM+Sans:wght@400;500&family=Space+Mono&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0a0a0a;
            --text: #f5f5f0;
            --accent: #ff6b35;
            --secondary: #2a2a2a;
            --muted: #666;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'DM Sans', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* Animated background */
        .bg-pattern {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
            opacity: 0.4;
        }

        .bg-pattern::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: 
                radial-gradient(ellipse at 20% 30%, rgba(255, 107, 53, 0.15) 0%, transparent 50%),
                radial-gradient(ellipse at 80% 70%, rgba(255, 107, 53, 0.08) 0%, transparent 40%);
            animation: drift 20s ease-in-out infinite;
        }

        @keyframes drift {
            0%, 100% { transform: translate(0, 0) rotate(0deg); }
            50% { transform: translate(2%, 2%) rotate(1deg); }
        }

        /* Grid lines */
        .grid-lines {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: 
                linear-gradient(rgba(255,255,255,0.02) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255,255,255,0.02) 1px, transparent 1px);
            background-size: 60px 60px;
            pointer-events: none;
            z-index: 0;
        }

        /* Header */
        header {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            padding: 2rem 4rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 100;
            backdrop-filter: blur(10px);
            background: rgba(10, 10, 10, 0.7);
        }

        .logo {
            font-family: 'Space Mono', monospace;
            font-size: 0.9rem;
            letter-spacing: 0.2em;
            color: var(--muted);
        }

        nav a {
            color: var(--text);
            text-decoration: none;
            margin-left: 2.5rem;
            font-size: 0.9rem;
            position: relative;
            transition: color 0.3s;
        }

        nav a::after {
            content: '';
            position: absolute;
            bottom: -4px;
            left: 0;
            width: 0;
            height: 1px;
            background: var(--accent);
            transition: width 0.3s;
        }

        nav a:hover::after {
            width: 100%;
        }

        nav a:hover {
            color: var(--accent);
        }

        /* Hero */
        .hero {
            min-height: 100vh;
            display: flex;
            align-items: center;
            padding: 0 4rem;
            position: relative;
            z-index: 1;
        }

        .hero-content {
            max-width: 800px;
        }

        .hero h1 {
            font-family: 'Playfair Display', serif;
            font-size: clamp(3rem, 8vw, 7rem);
            font-weight: 700;
            line-height: 1.05;
            margin-bottom: 1.5rem;
            opacity: 0;
            animation: fadeUp 1s ease forwards 0.2s;
        }

        .hero h1 span {
            display: block;
            color: var(--accent);
            font-style: italic;
        }

        .hero p {
            font-size: 1.2rem;
            color: var(--muted);
            max-width: 500px;
            line-height: 1.7;
            margin-bottom: 2.5rem;
            opacity: 0;
            animation: fadeUp 1s ease forwards 0.4s;
        }

        .cta-group {
            display: flex;
            gap: 1rem;
            opacity: 0;
            animation: fadeUp 1s ease forwards 0.6s;
        }

        .btn {
            padding: 1rem 2rem;
            font-size: 0.9rem;
            text-decoration: none;
            border-radius: 50px;
            transition: all 0.3s;
            cursor: pointer;
            display: inline-block;
        }

        .btn-primary {
            background: var(--accent);
            color: var(--bg);
            font-weight: 500;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(255, 107, 53, 0.3);
        }

        .btn-outline {
            border: 1px solid var(--secondary);
            color: var(--text);
        }

        .btn-outline:hover {
            border-color: var(--text);
        }

        @keyframes fadeUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Floating shapes */
        .floating-shapes {
            position: absolute;
            right: 10%;
            top: 50%;
            transform: translateY(-50%);
            width: 400px;
            height: 400px;
        }

        .shape {
            position: absolute;
            border-radius: 50%;
            animation: float 6s ease-in-out infinite;
        }

        .shape-1 {
            width: 200px;
            height: 200px;
            background: linear-gradient(135deg, var(--accent), transparent);
            top: 0;
            right: 0;
            opacity: 0.6;
            animation-delay: 0s;
        }

        .shape-2 {
            width: 150px;
            height: 150px;
            border: 2px solid var(--accent);
            bottom: 50px;
            right: 100px;
            animation-delay: 1s;
        }

        .shape-3 {
            width: 80px;
            height: 80px;
            background: var(--accent);
            bottom: 0;
            right: 200px;
            opacity: 0.4;
            animation-delay: 2s;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0) rotate(0deg); }
            50% { transform: translateY(-20px) rotate(5deg); }
        }

        /* Scroll indicator */
        .scroll-indicator {
            position: absolute;
            bottom: 3rem;
            left: 4rem;
            display: flex;
            align-items: center;
            gap: 1rem;
            opacity: 0;
            animation: fadeUp 1s ease forwards 0.8s;
        }

        .scroll-indicator span {
            font-size: 0.8rem;
            color: var(--muted);
            letter-spacing: 0.1em;
        }

        .scroll-line {
            width: 60px;
            height: 1px;
            background: var(--secondary);
            position: relative;
            overflow: hidden;
        }

        .scroll-line::after {
            content: '';
            position: absolute;
            left: -100%;
            width: 100%;
            height: 100%;
            background: var(--accent);
            animation: scrollMove 2s ease-in-out infinite;
        }

        @keyframes scrollMove {
            0% { left: -100%; }
            50%, 100% { left: 100%; }
        }

        /* Stats */
        .stats {
            display: flex;
            gap: 4rem;
            margin-top: 4rem;
            opacity: 0;
            animation: fadeUp 1s ease forwards 0.7s;
        }

        .stat {
            text-align: left;
        }

        .stat-number {
            font-family: 'Playfair Display', serif;
            font-size: 3rem;
            font-weight: 700;
            color: var(--accent);
        }

        .stat-label {
            font-size: 0.85rem;
            color: var(--muted);
            margin-top: 0.3rem;
        }

        @media (max-width: 768px) {
            header { padding: 1.5rem 2rem; }
            .hero { padding: 0 2rem; }
            .floating-shapes { display: none; }
            .stats { gap: 2rem; }
            .stat-number { font-size: 2rem; }
        }
    </style>
</head>
<body>
    <div class="bg-pattern"></div>
    <div class="grid-lines"></div>
    
    <header>
        <div class="logo">MINDFUL</div>
        <nav>
            <a href="#work">Work</a>
            <a href="#about">About</a>
            <a href="#contact">Contact</a>
        </nav>
    </header>

    <section class="hero">
        <div class="hero-content">
            <h1>Crafting Digital<span>Experiences</span></h1>
            <p>I'm a creative developer focused on building immersive web experiences that blend aesthetics with functionality.</p>
            
            <div class="stats">
                <div class="stat">
                    <div class="stat-number">8+</div>
                    <div class="stat-label">Years Experience</div>
                </div>
                <div class="stat">
                    <div class="stat-number">50+</div>
                    <div class="stat-label">Projects Done</div>
                </div>
                <div class="stat">
                    <div class="stat-number">12</div>
                    <div class="stat-label">Awards Won</div>
                </div>
            </div>

            <div class="cta-group" style="margin-top: 3rem;">
                <a href="#contact" class="btn btn-primary">Let's Talk</a>
                <a href="#work" class="btn btn-outline">View Work</a>
            </div>
        </div>

        <div class="floating-shapes">
            <div class="shape shape-1"></div>
            <div class="shape shape-2"></div>
            <div class="shape shape-3"></div>
        </div>

        <div class="scroll-indicator">
            <span>SCROLL</span>
            <div class="scroll-line"></div>
        </div>
    </section>
</body>
</html>

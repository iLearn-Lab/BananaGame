<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>水墨 · 氛围界面</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400;1,600&family=Noto+Serif+SC:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-ink: #2f2a24;
      --mist-1: #e6dcc8;
      --mist-2: #c4b28f;
      --line-glow: rgba(226, 198, 138, 0.26);
      --shadow-soft: 0 1px 1px rgba(34, 26, 16, 0.25), 0 3px 12px rgba(34, 26, 16, 0.16);
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html,
    body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: radial-gradient(circle at 20% 18%, #6f6554, #4b4338 38%, var(--bg-ink) 72%, #221d17);
      color: #e5decd;
    }

    body {
      font-family: "Noto Serif SC", "Songti SC", serif;
      letter-spacing: 0.02em;
    }

    main.ink-grid {
      position: relative;
      width: 100vw;
      height: 100vh;
      display: grid;
      grid-template-columns: 1fr 1fr;
      grid-template-rows: 1fr 1fr;
      gap: 0;
      isolation: isolate;
    }

    .cell {
      position: relative;
      overflow: hidden;
      isolation: isolate;
      background:
        radial-gradient(circle at 30% 40%, rgba(237, 220, 183, 0.38), transparent 52%),
        radial-gradient(circle at 70% 65%, rgba(194, 168, 116, 0.24), transparent 48%),
        linear-gradient(145deg, #5a4f40, #3b3329 58%, #241f18);
    }

    .cell img {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: contain;
      object-position: center;
      z-index: 0;
      filter: saturate(0.9) contrast(0.95);
    }

    .fx {
      position: absolute;
      inset: 0;
      pointer-events: none;
      z-index: 12;
    }

    .verse {
      position: absolute;
      z-index: 50;
      inset: auto auto 6% 6%;
      max-width: min(68%, 420px);
      color: var(--verse-color);
      text-shadow: var(--shadow-soft);
    }

    .verse .title {
      font-family: "Cormorant Garamond", "Times New Roman", serif;
      font-style: italic;
      font-weight: 600;
      font-size: clamp(1.45rem, 1rem + 1.7vw, 2.35rem);
      line-height: 1.1;
      margin-bottom: 0.32em;
    }

    .verse .line {
      font-size: clamp(0.82rem, 0.66rem + 0.45vw, 1.02rem);
      line-height: 1.65;
      opacity: 0.92;
    }

    .cell-327 { --verse-color: #d9c79b; }
    .cell-328 { --verse-color: #cfb280; }
    .cell-329 { --verse-color: #bfae8c; }
    .cell-330 { --verse-color: #d5c39a; }

    .cell-327 .fx-mist {
      background:
        radial-gradient(ellipse 58% 44% at 18% 58%, rgba(248, 241, 222, 0.30), transparent 64%),
        radial-gradient(ellipse 45% 40% at 72% 34%, rgba(212, 206, 188, 0.22), transparent 70%);
      mix-blend-mode: screen;
      animation: mistBreathA 11.8s ease-in-out -2.2s infinite alternate;
    }

    .cell-328 .fx-scan {
      background: linear-gradient(112deg, transparent 38%, rgba(243, 231, 205, 0.35) 48%, transparent 58%);
      transform: translateX(-115%);
      mix-blend-mode: screen;
      animation: sweepAcross 8.6s ease-in-out -1.4s infinite;
    }

    .cell-329 .fx-pulse {
      background:
        radial-gradient(ellipse 63% 55% at 66% 45%, rgba(224, 217, 196, 0.24), transparent 66%),
        linear-gradient(135deg, rgba(147, 165, 161, 0.12), rgba(191, 182, 152, 0.15), rgba(127, 138, 126, 0.1));
      mix-blend-mode: soft-light;
      animation: tonePulse 10.9s ease-in-out -3.1s infinite alternate;
    }

    .cell-327 img {
      animation: imageFloatA 12.6s ease-in-out -2.8s infinite;
    }

    .cell-328 img {
      animation: imageFloatB 13.9s ease-in-out -4.1s infinite;
    }

    .cell-329 img {
      animation: imageFloatC 11.7s ease-in-out -1.7s infinite;
    }

    .cell-330 img {
      animation: imageFloat 12.6s ease-in-out -2.8s infinite;
    }

    .ink-cross {
      position: absolute;
      inset: 0;
      z-index: 22;
      pointer-events: none;
    }

    .ink-cross::before,
    .ink-cross::after {
      content: "";
      position: absolute;
      background: linear-gradient(180deg, transparent, var(--line-glow), transparent);
      filter: blur(8px);
      opacity: 0.78;
    }

    .ink-cross::before {
      left: calc(50% - 7px);
      top: 0;
      width: 14px;
      height: 100%;
      animation: seamGlow 9.7s ease-in-out -1.6s infinite;
    }

    .ink-cross::after {
      top: calc(50% - 7px);
      left: 0;
      width: 100%;
      height: 14px;
      background: linear-gradient(90deg, transparent, var(--line-glow), transparent);
      animation: seamGlow 11.1s ease-in-out -3.4s infinite;
    }

    @keyframes mistBreathA {
      0% { opacity: 0.34; transform: scale(1) translate3d(0, 0, 0); }
      50% { opacity: 0.57; transform: scale(1.03) translate3d(1.2%, -0.8%, 0); }
      100% { opacity: 0.40; transform: scale(1.02) translate3d(-0.8%, 1%, 0); }
    }

    @keyframes sweepAcross {
      0%, 12% { transform: translateX(-115%); opacity: 0; }
      22% { opacity: 0.76; }
      50% { transform: translateX(15%); opacity: 0.48; }
      78% { transform: translateX(130%); opacity: 0; }
      100% { transform: translateX(130%); opacity: 0; }
    }

    @keyframes tonePulse {
      0% { opacity: 0.30; filter: saturate(0.92); }
      50% { opacity: 0.54; filter: saturate(1.05); }
      100% { opacity: 0.34; filter: saturate(0.94); }
    }

    @keyframes imageFloatA {
      0% { transform: scale(1) translateY(0); }
      50% { transform: scale(1.016) translateY(-1.2%); }
      100% { transform: scale(1.006) translateY(1.1%); }
    }

    @keyframes imageFloatB {
      0% { transform: scale(1.004) translateY(0.8%); }
      50% { transform: scale(1.018) translateY(-1.4%); }
      100% { transform: scale(1.002) translateY(0.9%); }
    }

    @keyframes imageFloatC {
      0% { transform: scale(1.002) translateY(0.5%); }
      50% { transform: scale(1.014) translateY(-1.1%); }
      100% { transform: scale(1.005) translateY(1.2%); }
    }

    @keyframes imageFloat {
      0% { transform: scale(1) translateY(0); }
      50% { transform: scale(1.018) translateY(-1.5%); }
      100% { transform: scale(1.008) translateY(1.3%); }
    }

    @keyframes seamGlow {
      0%, 100% { opacity: 0.35; }
      50% { opacity: 0.82; }
    }

    @media (max-width: 900px) {
      main.ink-grid {
        grid-template-columns: 1fr;
        grid-template-rows: repeat(4, 1fr);
        height: auto;
        min-height: 100vh;
      }

      html,
      body {
        overflow-y: auto;
      }

      .verse {
        inset: auto 5% 7% 5%;
        max-width: 90%;
      }

      .ink-cross {
        display: none;
      }
    }

    @media (prefers-reduced-motion: reduce) {
      *,
      *::before,
      *::after {
        animation: none !important;
        transition: none !important;
      }

      .fx-mist,
      .fx-scan,
      .fx-pulse {
        opacity: 0.34;
      }
    }
  </style>
</head>
<body>
  <main class="ink-grid" aria-label="水墨主题氛围界面">
    <figure class="cell cell-327">
      <img src="./微信图片_20260330184811_327_2.jpg" alt="水墨主题图像 327">
      <div class="fx fx-mist" aria-hidden="true"></div>
      <figcaption class="verse">
        <p class="title">Ink Breath</p>
        <p class="line">墨色在风里舒展，像旧梦在宣纸边缘慢慢洇开。</p>
      </figcaption>
    </figure>

    <figure class="cell cell-328">
      <img src="./微信图片_20260330184812_328_2.jpg" alt="水墨主题图像 328">
      <div class="fx fx-scan" aria-hidden="true"></div>
      <figcaption class="verse">
        <p class="title">Silent Sweep</p>
        <p class="line">一束微光掠过山岚，留下未说出口的温柔余温。</p>
      </figcaption>
    </figure>

    <figure class="cell cell-329">
      <img src="./微信图片_20260330184812_329_2.jpg" alt="水墨主题图像 329">
      <div class="fx fx-pulse" aria-hidden="true"></div>
      <figcaption class="verse">
        <p class="title">Tonal Pulse</p>
        <p class="line">冷暖互换之间，河岸的线条像心绪一样轻轻起伏。</p>
      </figcaption>
    </figure>

    <figure class="cell cell-330">
      <img src="./微信图片_20260330184813_330_2.jpg" alt="水墨主题图像 330">
      <figcaption class="verse">
        <p class="title">Floating Stillness</p>
        <p class="line">画面微微上扬，仿佛时间被温和地托起又放下。</p>
      </figcaption>
    </figure>

    <div class="ink-cross" aria-hidden="true"></div>
  </main>
</body>
</html>

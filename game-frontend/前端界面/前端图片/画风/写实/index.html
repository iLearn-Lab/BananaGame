<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>写实 · Realism Mood</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;0,500;0,700;1,400;1,600&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg-0: #070b14;
      --bg-1: #0d1324;
      --cold-text: #f3f7ff;
      --cold-shadow-1: rgba(9, 18, 38, 0.9);
      --cold-shadow-2: rgba(30, 62, 123, 0.45);
      --warm-text: #f6e9cc;
      --warm-shadow-1: rgba(36, 19, 6, 0.92);
      --warm-shadow-2: rgba(86, 49, 15, 0.5);
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      width: 100%;
      min-height: 100%;
      background: radial-gradient(circle at 20% 0%, #121a33 0%, var(--bg-0) 45%, #05070e 100%);
      color: #eef2ff;
      font-family: "EB Garamond", Georgia, "Times New Roman", serif;
    }

    body {
      overflow-x: hidden;
    }

    .realism-stage {
      min-height: 100vh;
      display: grid;
      grid-template-columns: 1.1fr 0.9fr 1.1fr;
      gap: 0;
      position: relative;
      isolation: isolate;
      background:
        linear-gradient(120deg, rgba(79, 132, 220, 0.12), rgba(0, 0, 0, 0) 38%),
        linear-gradient(300deg, rgba(205, 171, 109, 0.08), rgba(0, 0, 0, 0) 42%);
    }

    .column {
      min-height: 100vh;
      display: grid;
      position: relative;
      isolation: isolate;
    }

    .column-mid {
      grid-template-rows: 1fr 1fr;
    }

    .cell {
      position: relative;
      margin: 0;
      overflow: hidden;
      isolation: isolate;
      min-height: 50vh;
      background: #0a0f1a;
    }

    .cell img {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: center;
      z-index: 0;
      transform: scale(1.06);
      animation: imgFloat 12s ease-in-out infinite alternate;
      filter: saturate(1.07) contrast(1.05);
    }

    .cell::before,
    .cell::after {
      content: "";
      position: absolute;
      inset: 0;
      pointer-events: none;
    }

    .fx {
      position: absolute;
      inset: 0;
      z-index: 12;
      pointer-events: none;
      mix-blend-mode: screen;
    }

    .verse {
      position: absolute;
      inset: 0;
      z-index: 50;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: clamp(1rem, 3vw, 2.6rem);
      letter-spacing: 0.03em;
      line-height: 1.35;
    }

    .verse h2 {
      margin: 0 0 0.35em;
      font-size: clamp(1.55rem, 3.2vw, 2.8rem);
      font-weight: 600;
    }

    .verse p {
      margin: 0;
      font-size: clamp(0.95rem, 1.65vw, 1.3rem);
      font-style: italic;
      max-width: 22ch;
    }

    .cold .verse {
      color: var(--cold-text);
      text-shadow:
        0 1px 0 rgba(255, 255, 255, 0.08),
        0 0 12px var(--cold-shadow-2),
        0 2px 24px var(--cold-shadow-1);
    }

    .warm .verse {
      color: var(--warm-text);
      text-shadow:
        0 1px 0 rgba(255, 240, 214, 0.08),
        0 0 14px var(--warm-shadow-2),
        0 2px 24px var(--warm-shadow-1);
    }

    /* A=322: 边缘掠光 + 轻微暗角呼吸 */
    .cell-a::before {
      z-index: 8;
      background: radial-gradient(circle at 50% 50%, rgba(0, 0, 0, 0) 56%, rgba(0, 0, 0, 0.35) 100%);
      animation: vignetteBreathA 6.6s ease-in-out infinite;
    }

    .cell-a .fx {
      background: linear-gradient(118deg, rgba(255, 255, 255, 0) 38%, rgba(233, 242, 255, 0.5) 50%, rgba(255, 255, 255, 0) 62%);
      transform: translateX(-122%) skewX(-16deg);
      animation: edgeSweepA 4.8s ease-in-out -1.2s infinite;
      opacity: 0.9;
    }

    /* B=326: 金色焦散闪动 + 暗角呼吸 */
    .cell-b::before {
      z-index: 8;
      background: radial-gradient(circle at 45% 48%, rgba(0, 0, 0, 0) 50%, rgba(8, 4, 1, 0.62) 100%);
      animation: darkBreathB 7.2s ease-in-out -0.8s infinite;
    }

    .cell-b .fx {
      background:
        radial-gradient(circle at 21% 34%, rgba(255, 214, 125, 0.44) 0 8%, rgba(255, 214, 125, 0) 24%),
        radial-gradient(circle at 74% 59%, rgba(241, 182, 91, 0.42) 0 7%, rgba(241, 182, 91, 0) 20%),
        radial-gradient(circle at 58% 28%, rgba(255, 226, 163, 0.28) 0 5%, rgba(255, 226, 163, 0) 16%);
      animation: causticB 3.8s steps(2, end) -1.1s infinite;
      opacity: 0.85;
    }

    /* C=325: 冰蓝径向光斑呼吸 + 轻扫光 */
    .cell-c::before {
      z-index: 8;
      background:
        radial-gradient(circle at 52% 34%, rgba(179, 239, 255, 0.48) 0 26%, rgba(179, 239, 255, 0) 57%),
        radial-gradient(circle at 64% 62%, rgba(130, 209, 240, 0.32) 0 18%, rgba(130, 209, 240, 0) 55%);
      animation: iceBloomC 5.4s ease-in-out -0.5s infinite;
    }

    .cell-c .fx {
      background: linear-gradient(102deg, rgba(255, 255, 255, 0) 42%, rgba(224, 248, 255, 0.42) 50%, rgba(255, 255, 255, 0) 58%);
      transform: translateX(-130%);
      animation: sweepC 5.1s cubic-bezier(0.35, 0, 0.2, 1) -1.7s infinite;
      opacity: 0.82;
    }

    /* D=324: 镜面雾光脉动 + 细扫光 */
    .cell-d::before {
      z-index: 8;
      background:
        radial-gradient(circle at 45% 35%, rgba(191, 214, 255, 0.25) 0 22%, rgba(191, 214, 255, 0) 52%),
        linear-gradient(180deg, rgba(126, 146, 189, 0.18), rgba(0, 0, 0, 0.22) 78%);
      animation: mirrorPulseD 5.9s ease-in-out -0.6s infinite;
    }

    .cell-d .fx {
      background: linear-gradient(106deg, rgba(255, 255, 255, 0) 46%, rgba(230, 239, 255, 0.36) 50%, rgba(255, 255, 255, 0) 54%);
      transform: translateX(-128%) skewX(-8deg);
      animation: fineSweepD 6.2s ease-in-out -2.2s infinite;
      opacity: 0.72;
    }

    .cross-glow {
      position: absolute;
      left: 50%;
      top: 50%;
      width: min(30vw, 260px);
      height: min(30vw, 260px);
      transform: translate(-50%, -50%);
      border-radius: 999px;
      pointer-events: none;
      z-index: 16;
      background: radial-gradient(circle, rgba(208, 227, 255, 0.2) 0%, rgba(208, 227, 255, 0) 70%);
      filter: blur(6px);
      animation: centerPulse 5.6s ease-in-out infinite;
    }

    @keyframes imgFloat {
      0% { transform: scale(1.06) translateY(-1.2%); }
      100% { transform: scale(1.1) translateY(1.2%); }
    }

    @keyframes edgeSweepA {
      0% { transform: translateX(-122%) skewX(-16deg); }
      58% { transform: translateX(116%) skewX(-16deg); }
      100% { transform: translateX(116%) skewX(-16deg); }
    }

    @keyframes vignetteBreathA {
      0%, 100% { opacity: 0.48; }
      50% { opacity: 0.82; }
    }

    @keyframes darkBreathB {
      0%, 100% { opacity: 0.55; }
      50% { opacity: 0.86; }
    }

    @keyframes causticB {
      0%, 100% { opacity: 0.35; filter: blur(0px); }
      50% { opacity: 0.9; filter: blur(1px); }
    }

    @keyframes iceBloomC {
      0%, 100% { opacity: 0.34; transform: scale(0.97); }
      50% { opacity: 0.88; transform: scale(1.05); }
    }

    @keyframes sweepC {
      0% { transform: translateX(-130%); }
      62% { transform: translateX(124%); }
      100% { transform: translateX(124%); }
    }

    @keyframes mirrorPulseD {
      0%, 100% { opacity: 0.42; transform: scale(1); }
      50% { opacity: 0.8; transform: scale(1.04); }
    }

    @keyframes fineSweepD {
      0% { transform: translateX(-128%) skewX(-8deg); }
      65% { transform: translateX(126%) skewX(-8deg); }
      100% { transform: translateX(126%) skewX(-8deg); }
    }

    @keyframes centerPulse {
      0%, 100% { opacity: 0.18; transform: translate(-50%, -50%) scale(0.9); }
      50% { opacity: 0.45; transform: translate(-50%, -50%) scale(1.08); }
    }

    @media (max-width: 1024px) {
      .realism-stage {
        grid-template-columns: 1fr 1fr;
        grid-template-rows: auto auto auto;
      }

      .column-left {
        grid-column: 1 / -1;
      }

      .column-mid,
      .column-right {
        min-height: 72vh;
      }
    }

    @media (max-width: 760px) {
      .realism-stage {
        grid-template-columns: 1fr;
      }

      .column,
      .column-mid {
        min-height: auto;
        grid-template-rows: auto;
      }

      .cell {
        min-height: 62vh;
      }
    }

    @media (prefers-reduced-motion: reduce) {
      *,
      *::before,
      *::after {
        animation: none !important;
        transition: none !important;
      }

      .cell img {
        transform: scale(1.06);
      }
    }

    .style-nav-actions {
      position: fixed;
      right: 24px;
      bottom: 24px;
      z-index: 9999;
      display: flex;
      gap: 12px;
    }

    .style-nav-btn {
      border: 1px solid rgba(216, 231, 255, 0.56);
      background: rgba(13, 19, 36, 0.74);
      color: #eef5ff;
      border-radius: 999px;
      padding: 10px 18px;
      cursor: pointer;
      font-family: "EB Garamond", serif;
      font-size: 1rem;
      letter-spacing: 0.04em;
      backdrop-filter: blur(4px);
      transition: transform 180ms ease, opacity 180ms ease;
    }

    .style-nav-btn:hover {
      transform: translateY(-1px);
      opacity: 0.92;
    }
  </style>
</head>
<body>
  <main class="realism-stage">
    <section class="column column-left">
      <figure class="cell cell-d cold">
        <img src="./微信图片_20260330165615_324_2.jpg" alt="写实人物镜像，冷暗氛围" />
        <span class="fx" aria-hidden="true"></span>
        <figcaption class="verse">
          <h2>Mirror Silence</h2>
          <p>Truth stays brightest in the quietest frame.</p>
        </figcaption>
      </figure>
    </section>

    <section class="column column-mid">
      <figure class="cell cell-a cold">
        <img src="./微信图片_20260330165613_322_2.jpg" alt="写实人像，暗背景暖边光" />
        <span class="fx" aria-hidden="true"></span>
        <figcaption class="verse">
          <h2>Edge Of Light</h2>
          <p>A clear mind can still carry a burning edge.</p>
        </figcaption>
      </figure>

      <figure class="cell cell-b warm">
        <img src="./微信图片_20260330170051_326_2.jpg" alt="写实风格金黑人像，戏剧光影" />
        <span class="fx" aria-hidden="true"></span>
        <figcaption class="verse">
          <h2>Golden Oath</h2>
          <p>In darkness, every vow takes the color of gold.</p>
        </figcaption>
      </figure>
    </section>

    <section class="column column-right">
      <figure class="cell cell-c cold">
        <img src="./微信图片_20260330170050_325_2.jpg" alt="写实冷色人像，冰蓝高亮质感" />
        <span class="fx" aria-hidden="true"></span>
        <figcaption class="verse">
          <h2>Frost Bloom</h2>
          <p>Soft light turns resolve into visible grace.</p>
        </figcaption>
      </figure>
    </section>

    <div class="cross-glow" aria-hidden="true"></div>
  </main>
  <div class="style-nav-actions">
    <button id="confirm-style-choice" class="style-nav-btn">确认选择</button>
    <button id="back-style-selection" class="style-nav-btn">返回原界面</button>
  </div>
  <script>
    (function () {
      const style = new URLSearchParams(window.location.search).get('style') || 'realistic';
      const basePath = '../../../../index.html';
      function goBack(confirmed) {
        const backUrl = new URL(basePath, window.location.href);
        backUrl.searchParams.set('previewStyle', style);
        if (confirmed) {
          backUrl.searchParams.set('previewStyleConfirmed', '1');
        }
        window.location.href = backUrl.toString();
      }
      document.getElementById('confirm-style-choice').addEventListener('click', () => goBack(true));
      document.getElementById('back-style-selection').addEventListener('click', () => goBack(false));
    })();
  </script>
</body>
</html>

<!DOCTYPE html>
<html lang="zh-Hans">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mystery — 神秘</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400;1,500;1,600&display=swap" rel="stylesheet">
    <style>
        :root {
            --void-blue: #070a12;
            --mist: #1a2338;
            --silver: #c8d4e8;
            --ink: #0d1118;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            min-height: 100%;
            overflow-x: hidden;
        }

        body {
            overflow-y: auto;
            font-family: Georgia, 'Times New Roman', serif;
            background:
                radial-gradient(ellipse 100% 70% at 50% 0%, rgba(45, 60, 95, 0.55) 0%, transparent 55%),
                radial-gradient(ellipse 80% 60% at 10% 100%, rgba(20, 28, 48, 0.9) 0%, transparent 50%),
                linear-gradient(168deg, var(--void-blue) 0%, var(--mist) 45%, var(--ink) 100%);
            color: var(--silver);
        }

        .mystery-grid {
            display: grid;
            grid-template-columns: minmax(0, 1fr) minmax(0, 1fr);
            grid-template-rows: auto auto auto;
            align-items: start;
            width: 100%;
            max-width: 100%;
            gap: 0;
            min-height: auto;
        }

        .cell {
            position: relative;
            overflow: hidden;
            margin: 0;
            border: none;
            isolation: isolate;
            width: 100%;
            min-width: 0;
        }

        /* 整图入画：img 自然高度，页面可上下滚动；同行取较高一格对齐 */
        .cell--coast {
            grid-column: 1 / -1;
            grid-row: 1;
            background:
                radial-gradient(ellipse 85% 55% at 50% 100%, rgba(15, 45, 85, 0.95) 0%, transparent 58%),
                radial-gradient(ellipse 70% 45% at 25% 15%, rgba(50, 110, 140, 0.55) 0%, transparent 52%),
                linear-gradient(178deg, #060d18 0%, #0c1a32 42%, #050a14 100%);
        }

        .cell--castle {
            grid-column: 1;
            grid-row: 2;
            background:
                radial-gradient(ellipse 90% 60% at 50% 0%, rgba(120, 70, 95, 0.35) 0%, transparent 55%),
                radial-gradient(ellipse 65% 50% at 80% 70%, rgba(60, 85, 65, 0.4) 0%, transparent 50%),
                linear-gradient(168deg, #120c10 0%, #1f1418 45%, #0c080a 100%);
        }

        .cell--window {
            grid-column: 2;
            grid-row: 2;
            background:
                radial-gradient(ellipse 80% 55% at 40% 30%, rgba(120, 80, 180, 0.45) 0%, transparent 50%),
                radial-gradient(ellipse 70% 50% at 90% 80%, rgba(80, 50, 120, 0.5) 0%, transparent 48%),
                linear-gradient(152deg, #140a1c 0%, #221030 48%, #0a0612 100%);
        }

        .cell--panel {
            grid-column: 1;
            grid-row: 3;
            background:
                radial-gradient(ellipse 75% 50% at 30% 60%, rgba(50, 80, 130, 0.45) 0%, transparent 52%),
                linear-gradient(165deg, #0a101c 0%, #152030 50%, #060a12 100%);
        }

        .cell--spire {
            grid-column: 2;
            grid-row: 3;
            background:
                radial-gradient(ellipse 85% 55% at 50% 15%, rgba(100, 80, 110, 0.32) 0%, transparent 52%),
                radial-gradient(ellipse 60% 45% at 20% 75%, rgba(45, 60, 75, 0.42) 0%, transparent 48%),
                linear-gradient(172deg, #100c12 0%, #1a1420 48%, #08060c 100%);
        }

        .cell img {
            position: relative;
            z-index: 0;
            display: block;
            width: 100%;
            height: auto;
            object-fit: contain;
            object-position: center;
            transform-origin: center center;
        }

        /* ---------- Hero coast (307): float + radial sea-mist + particles ---------- */
        .cell--coast img {
            animation: imgFloatCoast 7.2s ease-in-out infinite;
        }

        /* ---------- Castle mist (305) ---------- */
        .cell--castle img {
            animation: imgFloatCastle 8.1s ease-in-out infinite;
            animation-delay: -1.8s;
        }

        /* ---------- Window (310) ---------- */
        .cell--window img {
            animation: imgFloatWindow 6.9s ease-in-out infinite;
            animation-delay: -3.2s;
        }

        /* ---------- Panel (311) ---------- */
        .cell--panel img {
            animation: imgFloatPanel 7.6s ease-in-out infinite;
            animation-delay: -0.9s;
        }

        /* ---------- Second castle column (306) ---------- */
        .cell--spire img {
            animation: imgFloatSpire 8.4s ease-in-out infinite;
            animation-delay: -4.6s;
        }

        /* contain 下略降 scale，避免浮动时露边 */
        @keyframes imgFloatCoast {
            0%, 100% { transform: translateY(0) scale(1.02); }
            50% { transform: translateY(-14px) scale(1.045); }
        }

        @keyframes imgFloatCastle {
            0%, 100% { transform: translateY(0) scale(1.02); }
            50% { transform: translateY(-12px) scale(1.04); }
        }

        @keyframes imgFloatWindow {
            0%, 100% { transform: translateY(0) scale(1.02); }
            50% { transform: translateY(-11px) scale(1.04); }
        }

        @keyframes imgFloatPanel {
            0%, 100% { transform: translateY(0) scale(1.02); }
            50% { transform: translateY(-12px) scale(1.04); }
        }

        @keyframes imgFloatSpire {
            0%, 100% { transform: translateY(0) scale(1.02); }
            50% { transform: translateY(-12px) scale(1.04); }
        }

        /* ---------- Literary overlay: rainbow gradient + glass panel ---------- */
        .cell-verse {
            position: absolute;
            inset: 0;
            z-index: 50;
            pointer-events: none;
            display: flex;
            font-family: 'Cormorant Garamond', Georgia, 'Times New Roman', serif;
            font-style: italic;
            font-weight: 600;
            font-size: 1rem;
            line-height: 1.52;
            letter-spacing: 0.03em;
            text-align: center;
            padding: clamp(0.85rem, 3.2vw, 1.75rem);
        }

        .cell-verse__glass {
            display: block;
            width: 100%;
            max-width: 100%;
            box-sizing: border-box;
            /* 字号随玻璃宽度变，与玻璃块同尺度；内边距用 em 跟字一起涨 */
            container-type: inline-size;
            container-name: verse-glass;
            font-size: clamp(2.4rem, 7.5vw, 4.5rem);
            font-size: clamp(2.2rem, 12.5cqi + 1.25rem, 4.85rem);
            line-height: 1.38;
            padding: 1.68em 1.92em;
            border-radius: 2em;
            background: linear-gradient(
                155deg,
                rgba(255, 255, 255, 0.38) 0%,
                rgba(255, 255, 255, 0.1) 38%,
                rgba(200, 220, 255, 0.16) 72%,
                rgba(255, 240, 255, 0.12) 100%
            );
            backdrop-filter: blur(18px) saturate(1.75);
            -webkit-backdrop-filter: blur(18px) saturate(1.75);
            border: 1px solid rgba(255, 255, 255, 0.48);
            box-shadow:
                0 0 0 1px rgba(255, 255, 255, 0.12) inset,
                0 14px 48px rgba(0, 0, 0, 0.42),
                0 -3px 28px rgba(255, 200, 255, 0.18) inset,
                0 0 60px rgba(140, 200, 255, 0.12);
            filter: drop-shadow(0 4px 20px rgba(0, 0, 0, 0.45));
        }

        .cell-verse__text {
            display: block;
            font-size: 1em;
            background: linear-gradient(
                118deg,
                rgba(255, 140, 210, 0.82),
                rgba(200, 130, 255, 0.85),
                rgba(110, 200, 255, 0.82),
                rgba(120, 255, 200, 0.78),
                rgba(255, 235, 130, 0.84),
                rgba(255, 150, 130, 0.8),
                rgba(180, 160, 255, 0.83)
            );
            background-size: 340% 120%;
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            color: transparent;
            -webkit-text-stroke: 0.052em rgba(0, 0, 0, 0.5);
            animation: verseRainbow 11s ease-in-out infinite;
        }

        @keyframes verseRainbow {
            0%, 100% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
        }

        .cell--coast .cell-verse {
            align-items: flex-end;
            justify-content: flex-start;
            text-align: left;
            max-width: 100%;
            padding-bottom: clamp(1rem, 5vh, 2.4rem);
            padding-right: clamp(1rem, 10vw, 3rem);
        }

        .cell--castle .cell-verse {
            align-items: flex-start;
            justify-content: flex-end;
            text-align: right;
            padding-top: clamp(1rem, 4vh, 2rem);
        }

        .cell--window .cell-verse {
            align-items: flex-start;
            justify-content: flex-start;
            text-align: left;
            max-width: 100%;
            font-weight: 600;
            padding-top: clamp(0.65rem, 2.5vw, 1.1rem);
        }

        .cell--panel .cell-verse {
            align-items: flex-end;
            justify-content: flex-end;
            text-align: right;
            padding-bottom: clamp(0.85rem, 4vh, 2rem);
        }

        .cell--spire .cell-verse {
            align-items: center;
            justify-content: center;
            text-align: center;
        }

        /* ---------- 307 coast: radial glow + dust + sweep (above img z0) ---------- */
        .fx-coast-glow {
            position: absolute;
            inset: 0;
            z-index: 10;
            pointer-events: none;
            background:
                radial-gradient(ellipse 95% 70% at 72% 38%, rgba(140, 230, 255, 0.52) 0%, transparent 48%),
                radial-gradient(ellipse 75% 55% at 22% 55%, rgba(60, 140, 220, 0.48) 0%, transparent 45%),
                radial-gradient(ellipse 60% 45% at 50% 85%, rgba(255, 248, 200, 0.35) 0%, transparent 40%);
            mix-blend-mode: screen;
            animation: coastGlow 5.8s ease-in-out infinite;
        }

        .fx-coast-dust {
            position: absolute;
            inset: 0;
            z-index: 11;
            pointer-events: none;
            opacity: 0.95;
            mix-blend-mode: screen;
            background-image:
                radial-gradient(circle at 18% 24%, rgba(255, 255, 255, 1) 0, rgba(255, 255, 255, 1) 0.55px, transparent 1.4px),
                radial-gradient(circle at 62% 18%, rgba(200, 240, 255, 0.95) 0, rgba(200, 240, 255, 0.95) 0.45px, transparent 1.2px),
                radial-gradient(circle at 44% 48%, rgba(255, 255, 255, 0.9) 0, rgba(255, 255, 255, 0.9) 0.4px, transparent 1.1px),
                radial-gradient(circle at 88% 36%, rgba(180, 230, 255, 0.88) 0, rgba(180, 230, 255, 0.88) 0.42px, transparent 1.15px);
            background-size: 100% 100%;
            animation: coastDust 4.2s ease-in-out infinite;
            animation-delay: -2.1s;
        }

        .fx-coast-deep {
            position: absolute;
            inset: 0;
            z-index: 12;
            pointer-events: none;
            background: linear-gradient(195deg, rgba(6, 18, 48, 0.38) 0%, transparent 35%, rgba(2, 10, 32, 0.48) 100%);
            mix-blend-mode: multiply;
            animation: coastDeep 7s ease-in-out infinite;
        }

        .fx-coast-sweep {
            position: absolute;
            inset: -50% -60%;
            z-index: 13;
            pointer-events: none;
            background: linear-gradient(
                102deg,
                transparent 38%,
                rgba(255, 255, 255, 0.55) 49.5%,
                rgba(200, 235, 255, 0.45) 50.5%,
                transparent 62%
            );
            mix-blend-mode: screen;
            animation: coastSweep 4.5s ease-in-out infinite;
            animation-delay: -1.4s;
        }

        @keyframes coastGlow {
            0%, 100% { opacity: 0.88; transform: scale(1) translate(0, 0); }
            45% { opacity: 1; transform: scale(1.14) translate(-2%, 2%); }
        }

        @keyframes coastDust {
            0%, 100% { opacity: 0.72; transform: translate(0, 0) scale(1); }
            50% { opacity: 1; transform: translate(3%, -4%) scale(1.03); }
        }

        @keyframes coastDeep {
            0%, 100% { opacity: 0.72; }
            50% { opacity: 1; }
        }

        @keyframes coastSweep {
            0%, 100% { transform: translate(-35%, 8%) rotate(-2deg); opacity: 0.25; }
            40% { opacity: 1; }
            55% { transform: translate(38%, -12%) rotate(1deg); opacity: 0.95; }
        }

        /* ---------- 305 castle: vignette + grain + mist + bloom ---------- */
        .fx-castle-vignette {
            position: absolute;
            inset: -5%;
            z-index: 10;
            pointer-events: none;
            background: radial-gradient(ellipse 75% 70% at 50% 45%, transparent 32%, rgba(8, 4, 22, 0.72) 100%);
            mix-blend-mode: multiply;
            animation: castleVignette 7s ease-in-out infinite;
        }

        .fx-castle-grain {
            position: absolute;
            inset: 0;
            z-index: 11;
            pointer-events: none;
            opacity: 0.32;
            mix-blend-mode: overlay;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
            animation: castleGrain 2.8s steps(2) infinite;
        }

        .fx-castle-mistlift {
            position: absolute;
            inset: -8%;
            z-index: 12;
            pointer-events: none;
            background: linear-gradient(0deg, rgba(255, 250, 255, 0.42) 0%, rgba(240, 230, 255, 0.22) 28%, transparent 50%);
            mix-blend-mode: soft-light;
            animation: castleMist 9s ease-in-out infinite;
        }

        .fx-castle-bloom {
            position: absolute;
            inset: -12%;
            z-index: 13;
            pointer-events: none;
            background:
                radial-gradient(ellipse 70% 55% at 45% 35%, rgba(255, 200, 230, 0.55) 0%, transparent 50%),
                radial-gradient(ellipse 55% 45% at 70% 60%, rgba(200, 255, 240, 0.35) 0%, transparent 48%);
            mix-blend-mode: screen;
            animation: castleBloom 6.2s ease-in-out infinite;
        }

        @keyframes castleVignette {
            0%, 100% { opacity: 0.78; transform: scale(1); }
            50% { opacity: 1; transform: scale(1.1); }
        }

        @keyframes castleGrain {
            0%, 100% { opacity: 0.22; }
            50% { opacity: 0.38; }
        }

        @keyframes castleMist {
            0%, 100% { transform: translateY(5%); opacity: 0.62; }
            50% { transform: translateY(-5%); opacity: 1; }
        }

        @keyframes castleBloom {
            0%, 100% { opacity: 0.65; transform: scale(1) translate(0, 0); }
            50% { opacity: 1; transform: scale(1.12) translate(2%, -3%); }
        }

        /* ---------- 310 window: veil + sheen + caustic + prism sweep ---------- */
        .fx-window-veil {
            position: absolute;
            inset: 0;
            z-index: 10;
            pointer-events: none;
            background:
                linear-gradient(125deg, rgba(160, 90, 255, 0.48) 0%, transparent 40%),
                linear-gradient(-35deg, rgba(255, 200, 255, 0.38) 0%, transparent 48%);
            mix-blend-mode: soft-light;
            animation: windowVeil 4.8s ease-in-out infinite;
        }

        .fx-window-sheen {
            position: absolute;
            inset: -35% -45%;
            z-index: 11;
            pointer-events: none;
            background: linear-gradient(
                105deg,
                transparent 38%,
                rgba(255, 255, 255, 0.62) 50%,
                transparent 62%
            );
            mix-blend-mode: screen;
            animation: windowSheen 5.5s ease-in-out infinite;
            animation-delay: -2s;
        }

        .fx-window-caustic {
            position: absolute;
            inset: 0;
            z-index: 12;
            pointer-events: none;
            background:
                radial-gradient(circle at 28% 35%, rgba(255, 255, 255, 0.55) 0%, transparent 3.5%),
                radial-gradient(circle at 62% 42%, rgba(240, 210, 255, 0.5) 0%, transparent 3%),
                radial-gradient(circle at 48% 58%, rgba(255, 255, 255, 0.38) 0%, transparent 2.8%);
            mix-blend-mode: screen;
            animation: windowCaustic 3.2s ease-in-out infinite;
            animation-delay: -0.8s;
        }

        .fx-window-prism {
            position: absolute;
            inset: -20%;
            z-index: 13;
            pointer-events: none;
            background: linear-gradient(
                125deg,
                rgba(255, 100, 200, 0.22) 0%,
                rgba(100, 200, 255, 0.2) 35%,
                rgba(200, 255, 160, 0.18) 70%,
                rgba(255, 220, 120, 0.2) 100%
            );
            mix-blend-mode: screen;
            opacity: 0.85;
            animation: windowPrism 8s ease-in-out infinite;
        }

        @keyframes windowVeil {
            0%, 100% { opacity: 0.72; }
            50% { opacity: 1; }
        }

        @keyframes windowSheen {
            0%, 100% { transform: translate(-28%, 12%) rotate(-3deg); opacity: 0.45; }
            50% { transform: translate(32%, -18%) rotate(2deg); opacity: 1; }
        }

        @keyframes windowCaustic {
            0%, 100% { opacity: 0.55; transform: scale(1); }
            35% { opacity: 1; transform: scale(1.08); }
            70% { opacity: 0.65; transform: scale(0.96); }
        }

        @keyframes windowPrism {
            0%, 100% { opacity: 0.55; transform: translate(0, 0) hue-rotate(0deg); }
            50% { opacity: 0.95; transform: translate(-3%, 2%) hue-rotate(25deg); }
        }

        /* ---------- 311 panel: seam + drift + sparks + edge sweep ---------- */
        .fx-panel-seam {
            position: absolute;
            inset: 0;
            z-index: 10;
            pointer-events: none;
            box-shadow:
                inset 0 0 70px rgba(30, 80, 140, 0.65),
                inset 0 0 160px rgba(10, 30, 60, 0.55),
                inset 0 0 24px rgba(255, 255, 255, 0.12);
            animation: panelSeam 4.5s ease-in-out infinite;
        }

        .fx-panel-drift {
            position: absolute;
            inset: -15%;
            z-index: 11;
            pointer-events: none;
            background: linear-gradient(160deg, rgba(100, 160, 230, 0.42) 0%, transparent 48%, rgba(60, 100, 180, 0.38) 100%);
            mix-blend-mode: soft-light;
            animation: panelDrift 7s ease-in-out infinite;
        }

        .fx-panel-spark {
            position: absolute;
            inset: 0;
            z-index: 12;
            pointer-events: none;
            background-image:
                radial-gradient(circle at 30% 70%, rgba(255, 255, 255, 1) 0, rgba(255, 255, 255, 1) 0.5px, transparent 1.4px),
                radial-gradient(circle at 75% 25%, rgba(200, 230, 255, 0.95) 0, rgba(200, 230, 255, 0.95) 0.45px, transparent 1.2px),
                radial-gradient(circle at 50% 40%, rgba(255, 255, 255, 0.8) 0, rgba(255, 255, 255, 0.8) 0.35px, transparent 1px);
            mix-blend-mode: screen;
            opacity: 0.88;
            animation: panelSpark 3.8s ease-in-out infinite;
            animation-delay: -1.2s;
        }

        .fx-panel-sweep {
            position: absolute;
            inset: -40% -50%;
            z-index: 13;
            pointer-events: none;
            background: linear-gradient(
                88deg,
                transparent 40%,
                rgba(180, 220, 255, 0.5) 50%,
                transparent 60%
            );
            mix-blend-mode: screen;
            animation: panelSweep 5s ease-in-out infinite;
        }

        @keyframes panelSeam {
            0%, 100% { opacity: 0.82; }
            50% { opacity: 1; }
        }

        @keyframes panelDrift {
            0%, 100% { transform: translate(0, 4%) rotate(0deg); opacity: 0.62; }
            50% { transform: translate(-5%, -3%) rotate(-1deg); opacity: 1; }
        }

        @keyframes panelSpark {
            0%, 100% { opacity: 0.55; transform: translate(0, 0) scale(1); }
            50% { opacity: 1; transform: translate(2%, -3%) scale(1.06); }
        }

        @keyframes panelSweep {
            0%, 100% { transform: translate(-40%, 0); opacity: 0.2; }
            45% { opacity: 1; }
            55% { transform: translate(45%, 5%); opacity: 0.9; }
        }

        /* ---------- 306 spire: ribbon + pulse + noise + aurora ---------- */
        .fx-spire-ribbon {
            position: absolute;
            inset: -18%;
            z-index: 10;
            pointer-events: none;
            background: linear-gradient(
                95deg,
                transparent 24%,
                rgba(200, 230, 255, 0.35) 46%,
                rgba(255, 220, 255, 0.42) 54%,
                transparent 76%
            );
            mix-blend-mode: screen;
            animation: spireRibbon 7.5s ease-in-out infinite;
        }

        .fx-spire-pulse {
            position: absolute;
            inset: 0;
            z-index: 11;
            pointer-events: none;
            background: radial-gradient(ellipse 85% 65% at 50% 38%, rgba(40, 70, 130, 0.45) 0%, transparent 52%);
            mix-blend-mode: multiply;
            animation: spirePulse 5.5s ease-in-out infinite;
        }

        .fx-spire-noise {
            position: absolute;
            inset: 0;
            z-index: 12;
            pointer-events: none;
            opacity: 0.22;
            mix-blend-mode: overlay;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n2'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.75' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n2)'/%3E%3C/svg%3E");
            animation: spireNoise 3.2s steps(2) infinite;
        }

        .fx-spire-aurora {
            position: absolute;
            inset: -10%;
            z-index: 13;
            pointer-events: none;
            background:
                radial-gradient(ellipse 100% 50% at 30% 20%, rgba(180, 255, 220, 0.35) 0%, transparent 45%),
                radial-gradient(ellipse 80% 55% at 75% 70%, rgba(200, 180, 255, 0.4) 0%, transparent 48%);
            mix-blend-mode: screen;
            animation: spireAurora 6.8s ease-in-out infinite;
        }

        @keyframes spireRibbon {
            0%, 100% { transform: translate(-8%, 0) rotate(-2deg); opacity: 0.65; }
            50% { transform: translate(10%, 4%) rotate(2deg); opacity: 1; }
        }

        @keyframes spirePulse {
            0%, 100% { opacity: 0.7; transform: scale(1); }
            50% { opacity: 1; transform: scale(1.08); }
        }

        @keyframes spireNoise {
            0%, 100% { opacity: 0.16; }
            50% { opacity: 0.32; }
        }

        @keyframes spireAurora {
            0%, 100% { opacity: 0.55; transform: translate(0, 0); }
            50% { opacity: 1; transform: translate(4%, -3%) scale(1.05); }
        }

        @media (max-width: 900px) {
            .mystery-grid {
                display: flex;
                flex-direction: column;
                align-items: stretch;
            }

            .cell {
                grid-column: unset;
                grid-row: unset;
                width: 100%;
            }

            .cell--coast {
                order: 1;
            }

            .cell--castle { order: 2; }
            .cell--window { order: 3; }
            .cell--panel { order: 4; }
            .cell--spire { order: 5; }
        }

</head>
<body>
    <main class="mystery-grid">

    <div class="tone-nav-actions">

        <button id="back-tone-selection" class="tone-nav-btn">返回原界面</button>
    </div>
    <script>
        (function () {
            const tone = new URLSearchParams(window.location.search).get('tone') || 'mysterious';
            const basePath = '../../../../index.html';
            function goBack(confirmed) {
                const backUrl = new URL(basePath, window.location.href);
                backUrl.searchParams.set('previewTone', tone);
                if (confirmed) {
                    backUrl.searchParams.set('previewToneConfirmed', '1');
                }
                window.location.href = backUrl.toString();
            }
            document.getElementById('confirm-tone-choice').addEventListener('click', () => goBack(true));
            document.getElementById('back-tone-selection').addEventListener('click', () => goBack(false));
        })();
    </script>

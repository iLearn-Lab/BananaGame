<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>搞笑幽默基调页</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Noto+Sans+SC:wght@500;700;900&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-0: #0a0c10;
      --bg-1: #0d1118;
      --ink: #f8ff3d;
      --stroke: #111111;
      --glow: #00e5ff;
    }

    * {
      box-sizing: border-box;
    }

    html, body {
      margin: 0;
      height: 100%;
      background: radial-gradient(circle at 50% 40%, #151b2a 0%, var(--bg-1) 58%, var(--bg-0) 100%);
      color: #fff;
      overflow: hidden;
      font-family: "Noto Sans SC", sans-serif;
    }

    .meme-wall {
      position: relative;
      width: 100vw;
      height: 100vh;
      display: grid;
      grid-template-columns: 1fr 1fr;
      grid-template-rows: 1fr 1fr;
      gap: 0;
      isolation: isolate;
    }

    .cell {
      position: relative;
      overflow: hidden;
      isolation: isolate;
      background: linear-gradient(145deg, #1a2438, #0c111f);
    }

    .cell::before {
      content: "";
      position: absolute;
      inset: 0;
      z-index: 5;
      background:
        radial-gradient(circle at 20% 20%, rgba(255, 255, 255, 0.22), transparent 46%),
        radial-gradient(circle at 78% 72%, rgba(0, 229, 255, 0.16), transparent 52%),
        linear-gradient(155deg, rgba(255, 255, 255, 0.09), rgba(6, 12, 22, 0.42));
      mix-blend-mode: screen;
      pointer-events: none;
    }

    .cell img {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: contain;
      object-position: center;
      z-index: 0;
      filter: saturate(1.08) contrast(1.04);
      animation: imgDrift 8s ease-in-out infinite alternate;
    }

    .verse {
      position: absolute;
      z-index: 50;
      left: 50%;
      top: 50%;
      transform: translate(-50%, -50%);
      width: min(88%, 640px);
      text-align: center;
      pointer-events: none;
      color: var(--ink);
      text-shadow:
        -2px -2px 0 var(--stroke),
         2px -2px 0 var(--stroke),
        -2px  2px 0 var(--stroke),
         2px  2px 0 var(--stroke),
         0 0 16px rgba(0, 229, 255, 0.75),
         0 0 34px rgba(0, 229, 255, 0.48);
    }

    .verse .line-cn {
      display: block;
      font-family: "Noto Sans SC", sans-serif;
      font-size: clamp(1rem, 2.1vw, 2.2rem);
      font-weight: 900;
      letter-spacing: 0.04em;
      line-height: 1.35;
      margin-bottom: 0.36em;
    }

    .verse .line-en {
      display: block;
      font-family: "Bebas Neue", sans-serif;
      font-size: clamp(1.06rem, 2.8vw, 2.95rem);
      letter-spacing: 0.08em;
      line-height: 1.05;
      opacity: 0.96;
    }

    .noise {
      position: absolute;
      inset: 0;
      z-index: 48;
      background-image:
        radial-gradient(circle at 13% 18%, rgba(255, 255, 255, 0.12) 0 1px, transparent 1.5px),
        radial-gradient(circle at 80% 42%, rgba(255, 255, 255, 0.1) 0 1px, transparent 1.5px),
        radial-gradient(circle at 27% 77%, rgba(255, 255, 255, 0.1) 0 1px, transparent 1.5px);
      background-size: 84px 84px, 102px 102px, 66px 66px;
      mix-blend-mode: soft-light;
      animation: grainPulse 2.4s steps(2) infinite;
      pointer-events: none;
    }

    .cross-v, .cross-h {
      position: absolute;
      z-index: 30;
      pointer-events: none;
      mix-blend-mode: screen;
    }

    .cross-v {
      left: 50%;
      top: -8%;
      width: 12px;
      height: 116%;
      transform: translateX(-50%);
      background: linear-gradient(to bottom, rgba(0, 229, 255, 0), rgba(0, 229, 255, 0.62), rgba(248, 255, 61, 0.4), rgba(0, 229, 255, 0));
      filter: blur(5px);
      animation: seamFlashV 2.8s ease-in-out infinite;
    }

    .cross-h {
      top: 50%;
      left: -8%;
      width: 116%;
      height: 12px;
      transform: translateY(-50%);
      background: linear-gradient(to right, rgba(0, 229, 255, 0), rgba(0, 229, 255, 0.62), rgba(248, 255, 61, 0.4), rgba(0, 229, 255, 0));
      filter: blur(5px);
      animation: seamFlashH 2.8s ease-in-out infinite 0.35s;
    }

    .core {
      position: absolute;
      z-index: 36;
      left: 50%;
      top: 50%;
      width: min(18vmin, 180px);
      aspect-ratio: 1;
      transform: translate(-50%, -50%);
      border-radius: 50%;
      background:
        radial-gradient(circle at 50% 50%, rgba(248, 255, 61, 0.92) 0 18%, rgba(0, 229, 255, 0.86) 18% 33%, rgba(0, 229, 255, 0.16) 58%, transparent 72%);
      box-shadow:
        0 0 38px rgba(0, 229, 255, 0.56),
        0 0 68px rgba(248, 255, 61, 0.3);
      animation: corePulse 1.25s cubic-bezier(0.22, 0.62, 0.36, 1) infinite;
      pointer-events: none;
    }

    .core::before {
      content: "LOL";
      position: absolute;
      left: 50%;
      top: 50%;
      transform: translate(-50%, -50%);
      font-family: "Bebas Neue", sans-serif;
      letter-spacing: 0.11em;
      font-size: clamp(1.05rem, 2.5vmin, 1.8rem);
      color: #101010;
      text-shadow: 0 0 8px rgba(255, 255, 255, 0.5);
    }

    /* 353_2: 边框爆闪（强） */
    .cell-353 .fx-border-burst {
      position: absolute;
      inset: 0;
      z-index: 16;
      border: 0.5vmin solid rgba(248, 255, 61, 0.72);
      box-shadow:
        inset 0 0 22px rgba(248, 255, 61, 0.74),
        0 0 26px rgba(248, 255, 61, 0.78),
        0 0 48px rgba(0, 229, 255, 0.55);
      animation: borderBurst 0.86s steps(2) infinite;
      pointer-events: none;
    }

    .cell-353 .fx-border-burst::before {
      content: "";
      position: absolute;
      inset: 0;
      border: 0.28vmin dashed rgba(0, 229, 255, 0.8);
      animation: borderDash 1.15s linear infinite;
    }

    /* 356_2: 果冻呼吸（强） */
    .cell-356 .fx-jelly {
      position: absolute;
      inset: 6% 5%;
      z-index: 14;
      border-radius: 12% 18% 14% 20%;
      background: radial-gradient(circle at 45% 30%, rgba(167, 255, 83, 0.38), rgba(77, 188, 65, 0.12) 40%, transparent 68%);
      mix-blend-mode: screen;
      animation: jellyBreath 1.75s ease-in-out infinite;
      pointer-events: none;
    }

    .cell-356 .fx-jelly::after {
      content: "";
      position: absolute;
      inset: 0;
      border-radius: inherit;
      border: 0.32vmin solid rgba(167, 255, 83, 0.56);
      filter: blur(1px);
      animation: jellyOutline 1.75s ease-in-out infinite reverse;
    }

    /* 412_2: 漫画速度线遮罩（中） */
    .cell-412 .fx-speedline {
      position: absolute;
      inset: 0;
      z-index: 13;
      background:
        repeating-linear-gradient(
          118deg,
          rgba(255, 255, 255, 0) 0 9px,
          rgba(255, 255, 255, 0.17) 9px 11px
        );
      mix-blend-mode: soft-light;
      animation: speedRush 2.9s linear infinite;
      pointer-events: none;
    }

    /* 414_2: 中心聚光脉冲（强） */
    .cell-414 .fx-spotlight {
      position: absolute;
      inset: 0;
      z-index: 15;
      background:
        radial-gradient(circle at 55% 42%, rgba(248, 255, 61, 0.85) 0 12%, rgba(0, 229, 255, 0.45) 16%, rgba(0, 229, 255, 0.16) 32%, transparent 54%);
      filter: blur(1.2px);
      mix-blend-mode: screen;
      animation: spotlightPulse 1.05s ease-in-out infinite;
      pointer-events: none;
    }

    @keyframes imgDrift {
      0% { transform: translateY(0) scale(1.02); }
      100% { transform: translateY(-1.1%) scale(1.04); }
    }

    @keyframes grainPulse {
      0%, 100% { opacity: 0.2; }
      50% { opacity: 0.38; }
    }

    @keyframes seamFlashV {
      0%, 100% { opacity: 0.36; transform: translateX(-50%) scaleY(1); }
      50% { opacity: 0.92; transform: translateX(-50%) scaleY(1.07); }
    }

    @keyframes seamFlashH {
      0%, 100% { opacity: 0.36; transform: translateY(-50%) scaleX(1); }
      50% { opacity: 0.9; transform: translateY(-50%) scaleX(1.07); }
    }

    @keyframes corePulse {
      0%, 100% { transform: translate(-50%, -50%) scale(0.94); }
      50% { transform: translate(-50%, -50%) scale(1.18); }
    }

    @keyframes borderBurst {
      0%, 100% { opacity: 0.42; filter: brightness(1) saturate(1); }
      48% { opacity: 1; filter: brightness(1.45) saturate(1.3); }
      52% { opacity: 0.18; filter: brightness(0.86) saturate(0.88); }
    }

    @keyframes borderDash {
      0% { transform: rotate(0deg) scale(1); opacity: 0.76; }
      100% { transform: rotate(360deg) scale(1.02); opacity: 0.92; }
    }

    @keyframes jellyBreath {
      0%, 100% { transform: scale(0.96) rotate(-1.2deg); opacity: 0.54; }
      40% { transform: scale(1.07, 0.94) rotate(1deg); opacity: 0.95; }
      75% { transform: scale(0.93, 1.07) rotate(-1deg); opacity: 0.62; }
    }

    @keyframes jellyOutline {
      0%, 100% { transform: scale(1); opacity: 0.7; }
      50% { transform: scale(1.06, 0.96); opacity: 0.96; }
    }

    @keyframes speedRush {
      0% { transform: translateX(0) skewX(0deg); opacity: 0.35; }
      50% { transform: translateX(2%) skewX(-2deg); opacity: 0.56; }
      100% { transform: translateX(-2%) skewX(2deg); opacity: 0.35; }
    }

    @keyframes spotlightPulse {
      0%, 100% { transform: scale(0.9); opacity: 0.48; }
      50% { transform: scale(1.22); opacity: 0.98; }
    }

    @media (max-width: 1024px) {
      .verse .line-cn { font-size: clamp(0.92rem, 2.6vw, 1.6rem); }
      .verse .line-en { font-size: clamp(1rem, 3.3vw, 2.2rem); }
      .core { width: min(22vmin, 160px); }
    }

    @media (max-width: 760px) {
      html, body {
        overflow: auto;
        height: auto;
      }

      .meme-wall {
        min-height: 100vh;
        height: auto;
        grid-template-columns: 1fr;
        grid-template-rows: repeat(4, minmax(42vh, 1fr));
      }

      .cross-v, .cross-h, .core {
        display: none;
      }
    }

    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after {
        animation: none !important;
        transition: none !important;
      }

      .noise {
        opacity: 0.25;
      }
    }
  </style>
</head>
<body>
  <main class="meme-wall" aria-label="搞笑幽默基调页">
    <figure class="cell cell-353">
      <img src="./微信图片_20260330202023_353_2.jpg" alt="哈士奇抱着高楼的夸张幽默画面">
      <div class="fx-border-burst" aria-hidden="true"></div>
      <figcaption class="verse">
        <span class="line-cn">打工人：先把楼抱稳，再说 KPI。</span>
        <span class="line-en">HOLD THE TOWER, HOLD MY TEARS.</span>
      </figcaption>
      <div class="noise" aria-hidden="true"></div>
    </figure>

    <figure class="cell cell-356">
      <img src="./微信图片_20260330202157_356_2.jpg" alt="绿色猫咪造型的荒诞搞笑画面">
      <div class="fx-jelly" aria-hidden="true"></div>
      <figcaption class="verse">
        <span class="line-cn">猫猫进化到第九形态：笑你不敢笑。</span>
        <span class="line-en">MEOW MODE: ABSURD LEVEL MAX.</span>
      </figcaption>
      <div class="noise" aria-hidden="true"></div>
    </figure>

    <figure class="cell cell-412">
      <img src="./微信图片_20260330202840_412_2.jpg" alt="古风人物倒拔垂柳的反差幽默画面">
      <div class="fx-speedline" aria-hidden="true"></div>
      <figcaption class="verse">
        <span class="line-cn">古风不古典，今天主打力拔山河。</span>
        <span class="line-en">ELEGANT? NO. CHAOTIC HERO? YES.</span>
      </figcaption>
      <div class="noise" aria-hidden="true"></div>
    </figure>

    <figure class="cell cell-414">
      <img src="./微信图片_20260330202924_414_2.jpg" alt="纸片人和猫咪同框的搞怪画面">
      <div class="fx-spotlight" aria-hidden="true"></div>
      <figcaption class="verse">
        <span class="line-cn">剧情已经离谱，但我们还在认真演。</span>
        <span class="line-en">PLOT BROKEN, VIBES UNSTOPPABLE.</span>
      </figcaption>
      <div class="noise" aria-hidden="true"></div>
    </figure>

    <div class="cross-v" aria-hidden="true"></div>
    <div class="cross-h" aria-hidden="true"></div>
    <div class="core" aria-hidden="true"></div>
  </main>
</body>
</html>
